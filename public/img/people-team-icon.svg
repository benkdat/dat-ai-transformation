<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <style>
    @keyframes pt-pulse { 0%, 100% { opacity: var(--base-alpha); } 50% { opacity: 1; } }
    @keyframes pt-glow-pulse { 0%, 100% { opacity: 0; } 50% { opacity: 0.25; } }
    @keyframes pt-ring-pulse { 0%, 100% { stroke-opacity: var(--ring-alpha); } 50% { stroke-opacity: calc(var(--ring-alpha) + 0.2); } }
    .pt-node-center { animation: pt-pulse calc(var(--dur, 3s) * 1.5) ease-in-out var(--delay, 0s) infinite; }
    .pt-node-ring   { animation: pt-ring-pulse calc(var(--dur, 3s) * 1.5) ease-in-out var(--delay, 0s) infinite; }
    .pt-node-glow   { animation: pt-glow-pulse calc(var(--dur, 3s) * 1.5) ease-in-out var(--delay, 0s) infinite; }
    @keyframes pt-person-glow-anim { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    .pt-person-glow { animation: pt-person-glow-anim 5s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { .pt-node-center, .pt-node-ring, .pt-node-glow, .pt-person-glow { animation: none; } }
  </style>
  <defs>
    <clipPath id="pt-rounded-clip"><rect x="0" y="0" width="800" height="800" rx="90" ry="90"/></clipPath>
    <radialGradient id="pt-person-glow-grad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0056FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0056FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pt-road-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0056FF" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="pt-text-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
