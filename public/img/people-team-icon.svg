<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Clip for rounded square -->
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="800" height="800" rx="112" ry="112"/>
    </clipPath>
    
    <!-- Radial glow behind person -->
    <radialGradient id="personGlow" cx="400" cy="240" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0056FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0056FF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Road gradient for depth -->
    <linearGradient id="roadGrad" x1="400" y1="680" x2="400" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
    
    <!-- Subtle network line glow -->
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle grid glow -->
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g clip-path="url(#roundedSquare)">
    <!-- True black background -->
    <rect width="800" height="800" fill="#000000"/>
    
    <!-- Subtle network mesh background -->
    <!-- Horizontal network lines -->
    <line x1="0" y1="200" x2="800" y2="200" stroke="#0056FF" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#0056FF" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#0056FF" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#0056FF" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="0" y1="600" x2="800" y2="600" stroke="#0056FF" stroke-opacity="0.06" stroke-width="1"/>
    
    <!-- Diagonal network lines from center -->
    <line x1="400" y1="240" x2="0" y2="100" stroke="#0056FF" stroke-opacity="0.04" stroke-width="1"/>
    <line x1="400" y1="240" x2="800" y2="100" stroke="#0056FF" stroke-opacity="0.04" stroke-width="1"/>
    <line x1="400" y1="240" x2="0" y2="400" stroke="#0056FF" stroke-opacity="0.04" stroke-width="1"/>
    <line x1="400" y1="240" x2="800" y2="400" stroke="#0056FF" stroke-opacity="0.04" stroke-width="1"/>
    
    <!-- Faint background grid dots -->
    <circle cx="200" cy="200" r="2" fill="#0056FF" opacity="0.08"/>
    <circle cx="400" cy="200" r="2" fill="#0056FF" opacity="0.08"/>
    <circle cx="600" cy="200" r="2" fill="#0056FF" opacity="0.08"/>
    <circle cx="100" cy="300" r="2" fill="#0056FF" opacity="0.08"/>
    <circle cx="300" cy="300" r="2" fill="#0056FF" opacity="0.08"/>
    <circle cx="500" cy="300" r="2" fill="#0056FF" opacity="0.08"/>
    <circle cx="700" cy="300" r="2" fill="#0056FF" opacity="0.08"/>
    <circle cx="200" cy="400" r="2" fill="#0056FF" opacity="0.08"/>
    <circle cx="600" cy="400" r="2" fill="#0056FF" opacity="0.08"/>
    
    <!-- Glow behind person -->
    <circle cx="400" cy="240" r="180" fill="url(#personGlow)"/>
    
    <!-- Converging road -->
    <!-- Left road edge — wide, unbroken, edge to edge -->
    <line x1="0" y1="800" x2="370" y2="280" stroke="#0056FF" stroke-width="3" stroke-opacity="0.9"/>
    <!-- Right road edge -->
    <line x1="800" y1="800" x2="430" y2="280" stroke="#0056FF" stroke-width="3" stroke-opacity="0.9"/>
    
    <!-- Road surface fill -->
    <polygon points="370,280 430,280 800,800 0,800" fill="url(#roadGrad)" opacity="0.5"/>
    
    <!-- Center dashed line -->
    <line x1="400" y1="800" x2="400" y2="290" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="20,14" stroke-opacity="0.7"/>
    
    <!-- Network connection lines from person to nodes -->
    <line x1="400" y1="220" x2="120" y2="160" stroke="#0056FF" stroke-width="2" stroke-opacity="0.6" filter="url(#lineGlow)"/>
    <line x1="400" y1="220" x2="680" y2="160" stroke="#0056FF" stroke-width="2" stroke-opacity="0.6" filter="url(#lineGlow)"/>
    <line x1="400" y1="220" x2="100" y2="320" stroke="#0056FF" stroke-width="2" stroke-opacity="0.6" filter="url(#lineGlow)"/>
    <line x1="400" y1="220" x2="700" y2="320" stroke="#0056FF" stroke-width="2" stroke-opacity="0.6" filter="url(#lineGlow)"/>
    
    <!-- Network nodes -->
    <circle cx="120" cy="160" r="8" fill="#0056FF" filter="url(#nodeGlow)"/>
    <circle cx="680" cy="160" r="8" fill="#0056FF" filter="url(#nodeGlow)"/>
    <circle cx="100" cy="320" r="8" fill="#0056FF" filter="url(#nodeGlow)"/>
    <circle cx="700" cy="320" r="8" fill="#0056FF" filter="url(#nodeGlow)"/>
    
    <!-- Inner glow on nodes -->
    <circle cx="120" cy="160" r="3.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="680" cy="160" r="3.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="100" cy="320" r="3.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="700" cy="320" r="3.5" fill="#FFFFFF" opacity="0.7"/>
    
    <!-- Person silhouette -->
    <!-- Head -->
    <circle cx="400" cy="195" r="30" fill="#0056FF"/>
    <!-- Shoulders/torso -->
    <path d="M360,240 Q360,225 370,225 L430,225 Q440,225 440,240 L445,275 Q445,280 440,280 L360,280 Q355,280 355,275 Z" fill="#0056FF"/>
    
    <!-- Person highlight -->
    <circle cx="400" cy="195" r="26" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
    
    <!-- PEOPLE TEAM text -->
    <text x="400" y="440" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" letter-spacing="4">PEOPLE</text>
    <text x="400" y="530" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" font-size="84" fill="#FFFFFF" letter-spacing="4">TEAM</text>
    
    <!-- DAT Logo at base -->
    <!-- Black rectangle behind logo for contrast -->
    <rect x="282" y="635" width="236" height="75" rx="4" fill="#000000"/>
    
    <!-- D box -->
    <rect x="295" y="645" width="55" height="55" rx="4" fill="#0056FF"/>
    <text x="322.5" y="685" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" font-size="36" fill="#FFFFFF">D</text>
    
    <!-- A box -->
    <rect x="358" y="645" width="55" height="55" rx="4" fill="#0056FF"/>
    <text x="385.5" y="685" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" font-size="36" fill="#FFFFFF">A</text>
    
    <!-- T box -->
    <rect x="421" y="645" width="55" height="55" rx="4" fill="#0056FF"/>
    <text x="448.5" y="685" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900" font-size="36" fill="#FFFFFF">T</text>
    
    <!-- "Freight & Analytics" text -->
    <text x="504" y="665" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="14.5" fill="#FFFFFF">
      <tspan x="504" dy="0">Freight</tspan>
      <tspan x="504" dy="16">&amp; Analytics</tspan>
    </text>
    
    <!-- TM mark -->
    <text x="483" y="650" font-family="Inter, sans-serif" font-weight="400" font-size="8" fill="#FFFFFF" opacity="0.6">™</text>
  </g>
</svg>