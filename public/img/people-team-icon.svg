    <circle cx="400" cy="300" r="270" fill="none" stroke="#0056FF" stroke-width="0.7" stroke-opacity="0.07"/>
    <circle cx="400" cy="300" r="370" fill="none" stroke="#0056FF" stroke-width="0.7" stroke-opacity="0.04"/>
